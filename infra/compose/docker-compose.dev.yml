services:
  gateway:
    image: nginx:${NGINX_VERSION}
    container_name: nta-dev-gateway
    depends_on:
      rustfs:
        condition: service_started
    ports:
      - "${DEV_GATEWAY_PORT}:80"
    volumes:
      - ../nginx/default.dev.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  postgres:
    image: ${POSTGRESQL_IMAGE}
    container_name: nta-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:${REDIS_VERSION}
    container_name: nta-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  temporal:
    image: temporalio/auto-setup:${TEMPORAL_VERSION}
    container_name: nta-temporal
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PWD: ${POSTGRES_PASSWORD}
      POSTGRES_SEEDS: postgres
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CLI_ADDRESS: temporal:7233
    ports:
      - "${TEMPORAL_PORT}:7233"
    volumes:
      - ../temporal/dynamicconfig:/etc/temporal/config/dynamicconfig:ro

  temporal-admin-tools:
    image: temporalio/admin-tools:${TEMPORAL_ADMINTOOLS_VERSION}
    container_name: nta-temporal-admin-tools
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CLI_ADDRESS: temporal:7233
    stdin_open: true
    tty: true

  temporal-namespace-init:
    image: temporalio/admin-tools:${TEMPORAL_ADMINTOOLS_VERSION}
    container_name: nta-temporal-namespace-init
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CLI_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: ${TEMPORAL_NAMESPACE}
    volumes:
      - ../scripts/create-temporal-namespace.sh:/scripts/create-temporal-namespace.sh:ro
    entrypoint: ["/bin/sh", "/scripts/create-temporal-namespace.sh"]
    restart: "no"

  temporal-ui:
    image: temporalio/ui:${TEMPORAL_UI_VERSION}
    container_name: nta-temporal-ui
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    ports:
      - "${TEMPORAL_UI_PORT}:8080"

  rustfs:
    image: rustfs/rustfs:${RUSTFS_VERSION}
    container_name: nta-rustfs
    command: ["/data"]
    environment:
      RUSTFS_ADDRESS: "0.0.0.0:9000"
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_CONSOLE_ADDRESS: "0.0.0.0:9001"
      RUSTFS_ACCESS_KEY: ${S3_ACCESS_KEY_ID}
      RUSTFS_SECRET_KEY: ${S3_SECRET_ACCESS_KEY}
    ports:
      - "${RUSTFS_PORT}:9000"
      - "${RUSTFS_CONSOLE_PORT}:9001"
    volumes:
      - rustfs_data:/data

  rustfs-init:
    image: minio/mc:${MINIO_MC_VERSION}
    container_name: nta-rustfs-init
    depends_on:
      - rustfs
    environment:
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_BUCKET_MAIN: ${S3_BUCKET_MAIN}
      S3_CORS_ALLOWED_ORIGINS: ${S3_CORS_ALLOWED_ORIGINS}
    volumes:
      - ../scripts/init-buckets.sh:/scripts/init-buckets.sh:ro
    entrypoint: ["/bin/sh", "/scripts/init-buckets.sh"]
    restart: "no"

volumes:
  postgres_data:
  redis_data:
  rustfs_data:

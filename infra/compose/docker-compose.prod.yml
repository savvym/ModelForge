services:
  gateway:
    image: nginx:${NGINX_VERSION}
    container_name: nta-gateway
    depends_on:
      frontend:
        condition: service_started
      api:
        condition: service_healthy
    ports:
      - "${HTTP_PORT}:80"
    restart: unless-stopped
    volumes:
      - ../nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  frontend:
    image: nta-platform/frontend:${APP_IMAGE_TAG}
    build:
      context: ../../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
        NEXT_PUBLIC_SSE_BASE_URL: ${NEXT_PUBLIC_SSE_BASE_URL:-}
        NEXT_PUBLIC_WS_BASE_URL: ${NEXT_PUBLIC_WS_BASE_URL:-}
    environment:
      NODE_ENV: production
      API_BASE_URL: ${API_BASE_URL}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  api:
    image: nta-platform/api:${APP_IMAGE_TAG}
    build:
      context: ../../backend
      dockerfile: Dockerfile.api
    environment:
      APP_ENV: ${APP_ENV}
      APP_NAME: ${APP_NAME}
      LOG_LEVEL: ${LOG_LEVEL}
      LOG_DIR: ${LOG_DIR}
      LOG_MAX_BYTES: ${LOG_MAX_BYTES}
      LOG_BACKUP_COUNT: ${LOG_BACKUP_COUNT}
      API_HOST: 0.0.0.0
      API_PORT: 8000
      API_BASE_PATH: /api/v1
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      CORS_ORIGINS: ${CORS_ORIGINS}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      TEMPORAL_HOST: ${TEMPORAL_HOST}
      TEMPORAL_NAMESPACE: ${TEMPORAL_NAMESPACE}
      TEMPORAL_TASK_QUEUE_EVAL: ${TEMPORAL_TASK_QUEUE_EVAL}
      TEMPORAL_TASK_QUEUE_BATCH: ${TEMPORAL_TASK_QUEUE_BATCH}
      TEMPORAL_TASK_QUEUE_DATASET: ${TEMPORAL_TASK_QUEUE_DATASET}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL}
      S3_BROWSER_ENDPOINT_URL: ${S3_BROWSER_ENDPOINT_URL}
      S3_REGION: ${S3_REGION}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_BUCKET_MAIN: ${S3_BUCKET_MAIN}
      S3_LOCAL_FALLBACK_ENABLED: ${S3_LOCAL_FALLBACK_ENABLED}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      temporal:
        condition: service_started
      rustfs:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/ready').read()\" >/dev/null 2>&1 || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    volumes:
      - ../../backend/logs:/app/logs

  worker:
    image: nta-platform/worker:${APP_IMAGE_TAG}
    build:
      context: ../../backend
      dockerfile: Dockerfile.worker
    environment:
      APP_ENV: ${APP_ENV}
      APP_NAME: ${APP_NAME}
      LOG_LEVEL: ${LOG_LEVEL}
      LOG_DIR: ${LOG_DIR}
      LOG_MAX_BYTES: ${LOG_MAX_BYTES}
      LOG_BACKUP_COUNT: ${LOG_BACKUP_COUNT}
      SECRET_KEY: ${SECRET_KEY}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      TEMPORAL_HOST: ${TEMPORAL_HOST}
      TEMPORAL_NAMESPACE: ${TEMPORAL_NAMESPACE}
      TEMPORAL_TASK_QUEUE_EVAL: ${TEMPORAL_TASK_QUEUE_EVAL}
      TEMPORAL_TASK_QUEUE_BATCH: ${TEMPORAL_TASK_QUEUE_BATCH}
      TEMPORAL_TASK_QUEUE_DATASET: ${TEMPORAL_TASK_QUEUE_DATASET}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL}
      S3_BROWSER_ENDPOINT_URL: ${S3_BROWSER_ENDPOINT_URL}
      S3_REGION: ${S3_REGION}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_BUCKET_MAIN: ${S3_BUCKET_MAIN}
      S3_LOCAL_FALLBACK_ENABLED: ${S3_LOCAL_FALLBACK_ENABLED}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      temporal:
        condition: service_started
      rustfs:
        condition: service_started
    restart: unless-stopped
    volumes:
      - ../../backend/logs:/app/logs

  postgres:
    image: ${POSTGRESQL_IMAGE}
    container_name: nta-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:${REDIS_VERSION}
    container_name: nta-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  temporal:
    image: temporalio/auto-setup:${TEMPORAL_VERSION}
    container_name: nta-temporal
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PWD: ${POSTGRES_PASSWORD}
      POSTGRES_SEEDS: postgres
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CLI_ADDRESS: temporal:7233
    volumes:
      - ../temporal/dynamicconfig:/etc/temporal/config/dynamicconfig:ro
    restart: unless-stopped

  temporal-admin-tools:
    image: temporalio/admin-tools:${TEMPORAL_ADMINTOOLS_VERSION}
    container_name: nta-temporal-admin-tools
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CLI_ADDRESS: temporal:7233
    stdin_open: true
    tty: true

  temporal-namespace-init:
    image: temporalio/admin-tools:${TEMPORAL_ADMINTOOLS_VERSION}
    container_name: nta-temporal-namespace-init
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CLI_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: ${TEMPORAL_NAMESPACE}
    volumes:
      - ../scripts/create-temporal-namespace.sh:/scripts/create-temporal-namespace.sh:ro
    entrypoint: ["/bin/sh", "/scripts/create-temporal-namespace.sh"]
    restart: "no"

  temporal-ui:
    image: temporalio/ui:${TEMPORAL_UI_VERSION}
    container_name: nta-temporal-ui
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:${HTTP_PORT}
    ports:
      - "127.0.0.1:${TEMPORAL_UI_PORT}:8080"
    restart: unless-stopped

  rustfs:
    image: rustfs/rustfs:${RUSTFS_VERSION}
    container_name: nta-rustfs
    command: ["/data"]
    environment:
      RUSTFS_ADDRESS: "0.0.0.0:9000"
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_CONSOLE_ADDRESS: "0.0.0.0:9001"
      RUSTFS_ACCESS_KEY: ${S3_ACCESS_KEY_ID}
      RUSTFS_SECRET_KEY: ${S3_SECRET_ACCESS_KEY}
    ports:
      - "${RUSTFS_PORT}:9000"
      - "${RUSTFS_CONSOLE_PORT}:9001"
    volumes:
      - rustfs_data:/data
    restart: unless-stopped

  rustfs-init:
    image: minio/mc:${MINIO_MC_VERSION}
    container_name: nta-rustfs-init
    depends_on:
      - rustfs
    environment:
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_BUCKET_MAIN: ${S3_BUCKET_MAIN}
      S3_CORS_ALLOWED_ORIGINS: ${S3_CORS_ALLOWED_ORIGINS}
    volumes:
      - ../scripts/init-buckets.sh:/scripts/init-buckets.sh:ro
    entrypoint: ["/bin/sh", "/scripts/init-buckets.sh"]
    restart: "no"

volumes:
  postgres_data:
  redis_data:
  rustfs_data:
